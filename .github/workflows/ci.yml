name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package-smoke:
    name: Package smoke / ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runner: ubuntu-24.04
            platform: linux-x64
          - name: darwin-arm64
            runner: macos-14
            platform: darwin-arm64
          - name: darwin-x64
            runner: macos-15-intel
            platform: darwin-x64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        run: scripts/build.sh dev
      - name: Smoke
        run: scripts/smoke.sh bin/gh
